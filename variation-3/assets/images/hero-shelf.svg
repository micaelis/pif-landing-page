<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 440" width="460" height="440" role="img" aria-label="A cozy reading shelf with books, a plant, a globe and a flamingo">
  <style>
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    .floaty { animation: float 6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .floaty.b { animation-delay: -2s; }
    .floaty.c { animation-delay: -4s; }
    @media (prefers-reduced-motion: reduce) { .floaty { animation: none; } }
  </style>
  <!-- backdrop card -->
  <rect x="20" y="40" width="420" height="360" rx="30" fill="#fbf4ea"/>
  <rect x="20" y="40" width="420" height="360" rx="30" fill="none" stroke="#e9a39c" stroke-opacity="0.4" stroke-width="2"/>
  <!-- wooden shelf -->
  <rect x="48" y="300" width="364" height="16" rx="6" fill="#c9a06a"/>
  <rect x="48" y="300" width="364" height="6" rx="3" fill="#d9b585"/>
  <!-- standing books -->
  <g class="floaty">
    <rect x="70" y="206" width="30" height="94" rx="4" fill="#25395c"/>
    <rect x="104" y="190" width="26" height="110" rx="4" fill="#e07a5f"/>
    <rect x="134" y="214" width="32" height="86" rx="4" fill="#7fa17a"/>
    <rect x="170" y="198" width="24" height="102" rx="4" fill="#e6b45a"/>
    <rect x="78" y="226" width="14" height="5" rx="2" fill="#fdf8f0" opacity="0.7"/>
    <rect x="110" y="212" width="14" height="5" rx="2" fill="#fdf8f0" opacity="0.7"/>
  </g>
  <!-- leaning book -->
  <g class="floaty b">
    <rect x="198" y="214" width="26" height="86" rx="4" fill="#e9a39c" transform="rotate(9 198 300)"/>
  </g>
  <!-- globe -->
  <g class="floaty c">
    <circle cx="276" cy="262" r="34" fill="#7fa17a"/>
    <path d="M252 248 q24 -12 48 0 M250 278 q26 12 52 0 M276 228 v68 M242 262 h68" stroke="#fdf8f0" stroke-width="1.8" opacity="0.6" fill="none"/>
    <rect x="266" y="296" width="20" height="7" rx="3" fill="#a87f4d"/>
  </g>
  <!-- stacked books right -->
  <g class="floaty">
    <rect x="318" y="284" width="86" height="18" rx="4" fill="#e07a5f"/>
    <rect x="324" y="268" width="78" height="18" rx="4" fill="#25395c"/>
    <rect x="330" y="252" width="70" height="18" rx="4" fill="#e6b45a"/>
  </g>
  <!-- plant top right -->
  <g class="floaty b">
    <path d="M360 200 c-18 -28 -18 -58 -2 -74 c4 26 8 46 10 74 Z" fill="#5d7d59"/>
    <path d="M366 200 c12 -32 36 -44 56 -38 c-24 12 -42 26 -50 40 Z" fill="#7fa17a"/>
    <rect x="344" y="200" width="48" height="40" rx="6" fill="#cf6a50"/>
    <rect x="344" y="200" width="48" height="11" rx="5" fill="#e07a5f"/>
  </g>
  <!-- flamingo -->
  <g class="floaty c">
    <path d="M150 300 c0 -30 -4 -52 -18 -66 c-12 -12 -8 -30 4 -36 c-9 10 0 20 7 22 c16 6 22 30 24 56 c1 12 1 22 1 30z" fill="#e9a39c"/>
    <path d="M132 188 c-9 -5 -20 -2 -22 7 c7 -2 12 0 16 5 c2 -7 4 -10 6 -12z" fill="#f1c2bc"/>
    <path d="M112 195 l-9 4 7 4z" fill="#2c2a2e"/>
    <circle cx="124" cy="193" r="2.2" fill="#2c2a2e"/>
  </g>
</svg>
