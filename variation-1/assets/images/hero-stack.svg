<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 460" width="440" height="460" role="img" aria-label="A stack of books with a plant, a globe and a flamingo">
  <style>
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .floaty { animation: float 6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .floaty.b { animation-delay: -2s; }
    .floaty.c { animation-delay: -4s; }
    @media (prefers-reduced-motion: reduce) { .floaty { animation: none; } }
  </style>
  <!-- soft halo -->
  <ellipse cx="230" cy="250" rx="200" ry="200" fill="#243a5e" opacity="0.55"/>
  <!-- plant -->
  <g class="floaty c">
    <path d="M120 250 C95 210 95 170 118 150 C124 185 130 210 134 248 Z" fill="#5d7d59"/>
    <path d="M134 248 C150 205 184 188 210 198 C176 214 152 232 138 252 Z" fill="#7fa17a"/>
    <path d="M134 250 C112 230 80 232 64 252 C96 256 118 256 138 256 Z" fill="#6b9166"/>
    <rect x="100" y="252" width="78" height="58" rx="8" fill="#e07a5f"/>
    <rect x="100" y="252" width="78" height="16" rx="6" fill="#cf6a50"/>
  </g>
  <!-- globe -->
  <g class="floaty b">
    <circle cx="330" cy="150" r="46" fill="#7fa17a"/>
    <circle cx="330" cy="150" r="46" fill="none" stroke="#fdf8f0" stroke-width="2" opacity="0.6"/>
    <path d="M300 132 q30 -16 60 0 M298 168 q32 16 64 0 M330 104 v92 M288 150 h84" stroke="#fdf8f0" stroke-width="2" opacity="0.55" fill="none"/>
    <path d="M312 120 c14 12 14 48 4 56 M350 124 c-12 14 -10 44 0 54" stroke="#fdf8f0" stroke-width="2" opacity="0.45" fill="none"/>
    <rect x="318" y="196" width="24" height="8" rx="3" fill="#a87f4d"/>
  </g>
  <!-- book stack -->
  <g class="floaty">
    <rect x="120" y="320" width="220" height="34" rx="7" fill="#e9a39c"/>
    <rect x="120" y="320" width="220" height="12" rx="6" fill="#f1c2bc"/>
    <circle cx="320" cy="337" r="5" fill="#cf6a50"/>
    <rect x="138" y="288" width="190" height="34" rx="7" fill="#25395c"/>
    <rect x="138" y="288" width="190" height="12" rx="6" fill="#34496e"/>
    <circle cx="310" cy="305" r="5" fill="#e6b45a"/>
    <rect x="112" y="256" width="206" height="34" rx="7" fill="#e6b45a"/>
    <rect x="112" y="256" width="206" height="12" rx="6" fill="#f0c870"/>
    <circle cx="300" cy="273" r="5" fill="#cf6a50"/>
  </g>
  <!-- standing book on top -->
  <g class="floaty b">
    <rect x="196" y="150" width="92" height="116" rx="8" fill="#e07a5f"/>
    <rect x="196" y="150" width="14" height="116" rx="6" fill="#cf6a50"/>
    <path d="M224 188 c10 -8 26 -8 36 0 c-10 -4 -26 -4 -36 0z" fill="#fdf8f0" opacity="0.85"/>
    <rect x="224" y="206" width="40" height="5" rx="2.5" fill="#fdf8f0" opacity="0.7"/>
    <rect x="224" y="218" width="30" height="5" rx="2.5" fill="#fdf8f0" opacity="0.55"/>
  </g>
  <!-- flamingo -->
  <g class="floaty c">
    <path d="M388 300 c-2 -34 -6 -58 -22 -74 c-14 -14 -10 -34 4 -40 c-10 12 0 22 8 24 c18 6 26 34 28 64 c1 12 1 20 1 28z" fill="#e9a39c"/>
    <path d="M366 188 c-10 -6 -22 -2 -24 8 c8 -2 14 0 18 6 c2 -8 4 -12 6 -14z" fill="#f1c2bc"/>
    <path d="M344 196 l-10 4 8 5 z" fill="#2c2a2e"/>
    <circle cx="356" cy="194" r="2.4" fill="#2c2a2e"/>
    <path d="M384 300 l-4 40 M392 300 l4 40" stroke="#e07a5f" stroke-width="3.5" stroke-linecap="round"/>
  </g>
</svg>
